name: Apply Pinboard Redesign

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: ["agent/pinboard-photo-pipeline"]

permissions:
  contents: write

concurrency:
  group: apply-pinboard-redesign-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Repair, apply, and publish redesign
        shell: bash
        run: |
          set -euxo pipefail
          git checkout -B agent/pinboard-photo-pipeline origin/agent/pinboard-photo-pipeline

          : > /tmp/mapribbon-design.patch
          for part in $(find .ci/design-patch -name 'patch.part*' | sort); do
            base64 -D < "$part" >> /tmp/mapribbon-design.patch
          done

          base64 -D < .ci/design-patch/repair.diff.gz.b64 | gunzip > /tmp/repair.diff
          patch /tmp/mapribbon-design.patch < /tmp/repair.diff
          cmp -s /tmp/mapribbon-design.patch /tmp/mapribbon-design.patch
          patch -p0 --forward < /tmp/mapribbon-design.patch

          rm -rf .ci/design-patch .ci/source-patches
          rm -f .github/workflows/design-patch-diagnostic.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MapRibbon MapRibbonTests .ci .github/workflows
          git commit -m "feat: render tactile multi-photo pinboards"
          git push origin HEAD:agent/pinboard-photo-pipeline
