name: Clean temporary reference refinement tooling

on:
  push:
    branches:
      - agent/reference-board-refinement

permissions:
  contents: write

jobs:
  cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/reference-board-refinement
          fetch-depth: 0

      - name: Remove one-shot refinement files
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/reference-board-refinement.yml \
            .github/workflows/reference-board-refinement-v2.yml \
            .github/workflows/reference-board-refinement-pr.yml \
            .github/workflows/reference-board-refinement-pr-v2.yml \
            .github/workflows/reference-board-refinement-pr-v3.yml \
            .github/workflows/reference-board-refinement-pr-v4.yml \
            .github/workflows/reference-board-refinement-pr-v5.yml \
            .github/workflows/cleanup-reference-refinement.yml \
            scripts/refine_board_reference.py \
            scripts/fix_reference_alignment.py \
            docs/reference-board-refinement.md \
            docs/reference-material-notes.md \
            docs/reference-acceptance-criteria.md
          rmdir scripts 2>/dev/null || true

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "chore: remove one-shot refinement tooling"
          git push origin HEAD:agent/reference-board-refinement
