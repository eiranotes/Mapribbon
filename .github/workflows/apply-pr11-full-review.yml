name: Apply PR 11 full review

on:
  push:
    branches:
      - claude/board-image-quality-4zwhs8

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply reviewed changes
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p Scripts
          cat > "$RUNNER_TEMP/pr11-patch.b64" <<'PATCH_B64'








NXADh/yV3WHUmIEu3IIn+uSbaPCrziz2w769e8e0dpXHHQVrDxWK0WhoknmW4S6GPPDaHFVH00WjUOIVxrHC+CRztqMKhQqUP8i2rhYA4XIOhMDRIDm05Q6P548ypyBKRpYrBQN4OGHoGVSMn49GNWxQ7KPY9j9ULmBY4P8G0JizLaYMAQA=
PATCH_B64
          base64 --decode "$RUNNER_TEMP/pr11-patch.b64" | gzip -d > Scripts/apply_pr11_full_review.py
          python3 Scripts/apply_pr11_full_review.py

      - name: Commit reviewed changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "fix: complete board quality review follow-ups"
          git push origin "HEAD:${GITHUB_REF_NAME}"
