name: Full UI audit capture

on:
  pull_request:
  push:
    branches:
      - agent/full-ui-audit-captures

permissions:
  contents: read

jobs:
  capture:
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Add audit-only launch routes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('MapRibbon/App/MapRibbonApp.swift')
          text = path.read_text(encoding='utf-8')
          replacement = '''if launchArguments.contains("--audit-onboarding") {
                      OnboardingView(onComplete: {})
                  } else if launchArguments.contains("--audit-home") {
                      NavigationStack { BoardsHomeView() }
                  } else if launchArguments.contains("--audit-atlas") {
                      NavigationStack { AtlasView() }
                  } else if launchArguments.contains("--audit-settings") {
                      NavigationStack { SettingsView() }
                  } else if launchArguments.contains("--audit-paywall") {
                      PaywallView()
                  } else if launchArguments.contains("--audit-export") {
                      AuditExportFixtureView()
                  } else if launchArguments.contains("--audit-places") {
                      AuditPlacesFixtureView()
                  } else if launchArguments.contains("--audit-generation") {
                      GenerationProgressView(step: .preparingMap, progress: 0.62)
                  } else if launchArguments.contains("--screenshot-board-editor") {
                      BoardEditorScreenshotFixtureView()
                  } else if launchArguments.contains("--screenshot-board-canvas") {
                      BoardCanvasScreenshotFixtureView()
                  } else {
                      RootView()
                  }'''
          pattern = r'if launchArguments\.contains\("--screenshot-board-editor"\) \{.*?\n\s*\} else \{\n\s*RootView\(\)\n\s*\}'
          text, count = re.subn(pattern, replacement, text, count=1, flags=re.DOTALL)
          if count != 1:
              raise SystemExit(f'launch route block match count={count}')

          marker = '@MainActor\nprivate enum BoardScreenshotFixture {'
          fixtures = '''@MainActor
          private struct AuditExportFixtureView: View {
              @State private var draft = BoardScreenshotFixture.makeDraft()

              var body: some View {
                  ExportSheet(draft: draft) { _, _ in }
              }
          }

          @MainActor
          private struct AuditPlacesFixtureView: View {
              @State private var draft = BoardScreenshotFixture.makeDraft()

              var body: some View {
                  PlaceManagerView(draft: draft)
              }
          }

          '''
          if marker not in text:
              raise SystemExit('fixture marker not found')
          text = text.replace(marker, fixtures + marker, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Select simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          DEVICE_INFO="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          preferred = ["iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"]
          for runtime in sorted(payload.get("devices", {}), reverse=True):
              phones = [d for d in payload["devices"][runtime] if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
              if not phones:
                  continue
              for name in preferred:
                  match = next((d for d in phones if d.get("name") == name), None)
                  if match:
                      print(match["udid"] + "|" + match["name"] + "|" + runtime)
                      raise SystemExit
              selected = next((d for d in phones if "Pro" in d.get("name", "")), phones[0])
              print(selected["udid"] + "|" + selected["name"] + "|" + runtime)
              raise SystemExit
          ')"
          IFS='|' read -r UDID DEVICE_NAME RUNTIME <<< "$DEVICE_INFO"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"

      - name: Build and test
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO

      - name: Capture current UI screens
        shell: bash
        run: |
          set -euo pipefail
          UDID="${{ steps.simulator.outputs.udid }}"
          APP_PATH="$(find "$RUNNER_TEMP/DerivedData/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name 'MapRibbon.app' -print -quit)"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"
          OUT="$RUNNER_TEMP/mapribbon-full-ui-audit"
          mkdir -p "$OUT"

          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl ui "$UDID" appearance light || true
          xcrun simctl status_bar "$UDID" override --time 10:41 --batteryState charged --batteryLevel 100 --wifiBars 3 --cellularBars 4 || true
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl privacy "$UDID" revoke photos "$BUNDLE_ID" || true

          capture() {
            local flag="$1"
            local name="$2"
            xcrun simctl launch --terminate-running-process "$UDID" "$BUNDLE_ID" "$flag"
            sleep 3
            xcrun simctl io "$UDID" screenshot "$OUT/$name.png"
          }

          capture --audit-onboarding onboarding
          capture --audit-home home-permission
          capture --audit-atlas atlas-empty
          capture --audit-settings settings
          capture --audit-paywall paywall
          capture --audit-export export
          capture --audit-places places
          capture --audit-generation generation
          capture --screenshot-board-editor board-editor
          capture --screenshot-board-canvas board-canvas

          {
            echo "device=${{ steps.simulator.outputs.name }}"
            echo "runtime=${{ steps.simulator.outputs.runtime }}"
            echo "commit=$GITHUB_SHA"
          } > "$OUT/metadata.txt"
          ls -lh "$OUT"

      - name: Upload UI audit screenshots
        uses: actions/upload-artifact@v4
        with:
          name: mapribbon-full-ui-audit
          path: ${{ runner.temp }}/mapribbon-full-ui-audit
          retention-days: 14
          if-no-files-found: error
