name: Refine board after audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  refine:
    if: github.head_ref == 'agent/full-ui-overhaul' && github.actor != 'github-actions[bot]'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-ui-overhaul
          fetch-depth: 0

      - name: Apply visual refinement
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/refine_board_after_audit.py
          python3 scripts/refine_board_after_audit.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path("MapRibbon/App/MapRibbonApp.swift")
          text = path.read_text(encoding="utf-8")
          old = 'center: CGPoint(x: 95 + index * 130, y: 300 + CGFloat(index % 2) * 24)'
          new = 'center: CGPoint(x: CGFloat(95 + index * 130), y: CGFloat(300 + (index % 2) * 24))'
          if text.count(old) != 1:
              raise RuntimeError(f"fixture CGFloat fix: expected one match, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git diff --check

      - name: Resolve simulator
        id: sim
        run: |
          set -euo pipefail
          UDID="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          devices=json.load(sys.stdin).get("devices", {})
          for runtime in sorted(devices, reverse=True):
              phones=[d for d in devices[runtime] if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
              if phones:
                  print(next((d for d in phones if "Pro" in d.get("name", "")), phones[0])["udid"])
                  raise SystemExit
          ')"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Xcode test
        id: xcode
        continue-on-error: true
        run: |
          set +e
          LOG="$RUNNER_TEMP/refine-xcode.log"
          xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            >"$LOG" 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            grep -nE "error:|BUILD FAILED|TEST FAILED|The following build commands failed" "$LOG" | tail -n 100 || true
          else
            tail -n 60 "$LOG"
          fi
          exit "$STATUS"

      - name: Upload refinement diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: board-refinement-xcode-log
          path: ${{ runner.temp }}/refine-xcode.log
          retention-days: 7
          if-no-files-found: warn

      - name: Commit refined board
        if: steps.xcode.outputs.status == '0'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MapRibbon
          git diff --cached --quiet && { echo "No board changes"; exit 1; }
          git commit -m "fix: refine board composition after simulator audit"
          git push origin HEAD:agent/full-ui-overhaul

      - name: Fail on Xcode error
        if: steps.xcode.outputs.status != '0'
        run: exit 1
