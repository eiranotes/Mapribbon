name: iOS CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "agent/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, test and capture (Xcode 16.4)
    runs-on: macos-15
    timeout-minutes: 45

    env:
      PROJECT: MapRibbon.xcodeproj
      SCHEME: MapRibbon
      CONFIGURATION: Debug
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      RESULT_BUNDLE: ${{ github.workspace }}/TestResults.xcresult
      APP_BUNDLE_ID: com.eiraworks.MapRibbon
      APP_PATH: ${{ github.workspace }}/DerivedData/Build/Products/Debug-iphonesimulator/MapRibbon.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks

      - name: Resolve iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          DEVICE_UDID="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          data = json.load(sys.stdin)
          preferred = ["iPhone 16 Pro", "iPhone 16", "iPhone 16e", "iPhone SE (3rd generation)"]
          devices = [d for runtime in data["devices"].values() for d in runtime if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
          for name in preferred:
              match = next((d for d in devices if d["name"] == name), None)
              if match:
                  print(match["udid"])
                  break
          else:
              if not devices:
                  raise SystemExit("No available iPhone simulator found")
              print(devices[0]["udid"])
          ' )"
          DEVICE_NAME="$(xcrun simctl list devices | grep "$DEVICE_UDID" | sed -E 's/^[[:space:]]*([^\(]+).*/\1/' | xargs)"
          echo "udid=$DEVICE_UDID" >> "$GITHUB_OUTPUT"
          echo "name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $DEVICE_NAME ($DEVICE_UDID)"

      - name: Validate project and scheme
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -list | tee project-list.log

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            clean build | tee build.log | xcbeautify

      - name: Run unit tests
        run: |
          set -o pipefail
          rm -rf "$RESULT_BUNDLE"
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
            test | tee test.log | xcbeautify

      - name: Capture simulator screenshots
        run: |
          set -euxo pipefail
          UDID="${{ steps.simulator.outputs.udid }}"
          LOCALE_ARGS=(--args -AppleLanguages '(ko)' -AppleLocale ko_KR)
          mkdir -p Screenshots

          xcrun simctl boot "$UDID" 2>/dev/null || true
          sleep 12
          xcrun simctl ui "$UDID" appearance light || true

          test -d "$APP_PATH"
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl privacy "$UDID" grant photos "$APP_BUNDLE_ID" || true
          xcrun simctl privacy "$UDID" grant photos-add "$APP_BUNDLE_ID" || true

          xcrun simctl spawn "$UDID" defaults delete "$APP_BUNDLE_ID" hasCompletedOnboarding 2>/dev/null || true
          xcrun simctl launch --terminate-running-process "$UDID" "$APP_BUNDLE_ID" "${LOCALE_ARGS[@]}"
          sleep 5
          xcrun simctl io "$UDID" screenshot Screenshots/01-onboarding.png

          xcrun simctl terminate "$UDID" "$APP_BUNDLE_ID" || true
          xcrun simctl spawn "$UDID" defaults write "$APP_BUNDLE_ID" hasCompletedOnboarding -bool true
          xcrun simctl launch --terminate-running-process "$UDID" "$APP_BUNDLE_ID" "${LOCALE_ARGS[@]}"
          sleep 5
          xcrun simctl io "$UDID" screenshot Screenshots/02-home.png

          xcrun simctl terminate "$UDID" "$APP_BUNDLE_ID" || true
          xcrun simctl launch --terminate-running-process "$UDID" "$APP_BUNDLE_ID" --ci-demo-editor "${LOCALE_ARGS[@]}"
          sleep 10
          xcrun simctl io "$UDID" screenshot Screenshots/03-demo-board-editor.png

          xcrun simctl terminate "$UDID" "$APP_BUNDLE_ID" || true
          xcrun simctl launch --terminate-running-process "$UDID" "$APP_BUNDLE_ID" --ci-demo-places "${LOCALE_ARGS[@]}"
          sleep 10
          xcrun simctl io "$UDID" screenshot Screenshots/04-demo-place-manager.png

          xcrun simctl terminate "$UDID" "$APP_BUNDLE_ID" || true
          xcrun simctl launch --terminate-running-process "$UDID" "$APP_BUNDLE_ID" --ci-demo-export "${LOCALE_ARGS[@]}"
          sleep 10
          xcrun simctl io "$UDID" screenshot Screenshots/05-demo-export.png

          file Screenshots/*.png

      - name: Summarize test result
        if: always()
        run: |
          if [ -d "$RESULT_BUNDLE" ]; then
            xcrun xcresulttool get test-results summary \
              --path "$RESULT_BUNDLE" \
              --format json > test-summary.json || true
            cat test-summary.json || true
          fi

      - name: Upload CI diagnostics and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ci-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            project-list.log
            build.log
            test.log
            test-summary.json
            TestResults.xcresult
            Screenshots/*.png
