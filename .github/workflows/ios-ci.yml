name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
      - agent/full-ui-overhaul
      - agent/board-artwork-atlas-rework

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Build, capture, and test MapRibbon
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          xcodebuild -showsdks
          DEVICE_INFO="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          preferred = ["iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"]
          for runtime in sorted(payload.get("devices", {}), reverse=True):
              phones = [d for d in payload["devices"][runtime] if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
              if not phones:
                  continue
              for name in preferred:
                  match = next((d for d in phones if d.get("name") == name), None)
                  if match:
                      print(match["udid"] + "|" + match["name"] + "|" + runtime)
                      raise SystemExit
              selected = next((d for d in phones if "Pro" in d.get("name", "")), phones[0])
              print(selected["udid"] + "|" + selected["name"] + "|" + runtime)
              raise SystemExit
          ')"
          IFS='|' read -r UDID DEVICE_NAME RUNTIME <<< "$DEVICE_INFO"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"

      - name: Build app for screenshots
        id: build
        shell: bash
        run: |
          set +e
          LOG_FILE="$RUNNER_TEMP/xcodebuild-app.log"
          xcodebuild build \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            >"$LOG_FILE" 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            grep -nE "error:|BUILD FAILED|The following build commands failed" "$LOG_FILE" | tail -n 160 || true
            tail -n 160 "$LOG_FILE"
          fi
          exit 0

      - name: Prepare screenshot simulator
        if: steps.build.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          UDID="${{ steps.simulator.outputs.udid }}"
          APP_PATH="$(find "$RUNNER_TEMP/DerivedData/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name 'MapRibbon.app' -print -quit)"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"
          OUT="$RUNNER_TEMP/mapribbon-ui-overhaul"
          mkdir -p "$OUT"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl ui "$UDID" appearance light || true
          xcrun simctl status_bar "$UDID" override --time 10:41 --batteryState discharging --batteryLevel 100 --wifiBars 3 --cellularBars 4 || true
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl privacy "$UDID" revoke photos "$BUNDLE_ID" || true
          {
            echo "UDID=$UDID"
            echo "BUNDLE_ID=$BUNDLE_ID"
            echo "OUT=$OUT"
          } > "$RUNNER_TEMP/screenshot.env"
          cat > "$RUNNER_TEMP/capture-screen.sh" <<'SH'
          #!/bin/bash
          set -euo pipefail
          source "$RUNNER_TEMP/screenshot.env"
          FLAG="$1"
          NAME="$2"
          WAIT="${3:-3}"
          LANGUAGE="${4:-ko}"
          LOCALE="${5:-ko_KR}"
          APPEARANCE="${6:-light}"
          STYLE_ARGS=(-AppleInterfaceStyle Light)
          if [ "$APPEARANCE" = "dark" ]; then
            STYLE_ARGS=(-AppleInterfaceStyle Dark)
          fi
          xcrun simctl terminate "$UDID" "$BUNDLE_ID" 2>/dev/null || true
          xcrun simctl ui "$UDID" appearance "$APPEARANCE" || true
          sleep 1
          xcrun simctl launch "$UDID" "$BUNDLE_ID" "$FLAG" "${STYLE_ARGS[@]}" -AppleLanguages "($LANGUAGE)" -AppleLocale "$LOCALE"
          sleep "$WAIT"
          xcrun simctl io "$UDID" screenshot "$OUT/$NAME.png"
          SH
          chmod +x "$RUNNER_TEMP/capture-screen.sh"

      - name: Capture onboarding
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-onboarding onboarding"

      - name: Capture home
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-home home"

      - name: Capture library
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-library library"

      - name: Capture Korea atlas
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-atlas atlas-korea 6"

      - name: Capture Japan atlas
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-atlas-japan atlas-japan 6"

      - name: Capture settings
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-settings settings"

      - name: Capture paywall
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-paywall paywall"

      - name: Capture generation
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-generation generation"

      - name: Capture editor
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-board-editor board-editor"

      - name: Capture board poster
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-board-canvas board-poster"

      - name: Capture export sheet
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-export export"

      - name: Capture place manager
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-places places"

      - name: Capture board feed
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-board-feed board-feed"

      - name: Capture board story
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-board-story board-story"

      - name: Capture Japanese board poster
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-board-canvas board-poster-ja 3 ja ja_JP"

      - name: Capture dark home
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-home home-dark 3 ko ko_KR dark"

      - name: Capture dark Korea atlas
        if: steps.build.outputs.status == '0'
        continue-on-error: true
        timeout-minutes: 2
        run: "$RUNNER_TEMP/capture-screen.sh --screenshot-atlas atlas-korea-dark 6 ko ko_KR dark"

      - name: Validate screenshot matrix
        id: screenshots
        if: always()
        shell: bash
        run: |
          OUT="$RUNNER_TEMP/mapribbon-ui-overhaul"
          COUNT="$(find "$OUT" -maxdepth 1 -name '*.png' 2>/dev/null | wc -l | tr -d ' ')"
          echo "Captured $COUNT of 17 expected screenshots"
          if [ "$COUNT" -eq 17 ]; then
            STATUS=0
          else
            STATUS=1
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          {
            echo "device=${{ steps.simulator.outputs.name }}"
            echo "runtime=${{ steps.simulator.outputs.runtime }}"
            echo "commit=$GITHUB_SHA"
            echo "screenshot_count=$COUNT"
          } > "$OUT/metadata.txt"
          ls -lh "$OUT" || true

      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapribbon-ui-overhaul-screenshots
          path: ${{ runner.temp }}/mapribbon-ui-overhaul
          retention-days: 14
          if-no-files-found: warn

      - name: Run Xcode tests
        id: xcode
        shell: bash
        run: |
          set +e
          LOG_FILE="$RUNNER_TEMP/xcodebuild-tests.log"
          xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/MapRibbon.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            >"$LOG_FILE" 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            tail -n 100 "$LOG_FILE"
          else
            grep -nE "error:|BUILD FAILED|TEST FAILED|Testing failed|The following build commands failed" "$LOG_FILE" | tail -n 160 || true
            tail -n 160 "$LOG_FILE"
          fi
          exit 0

      - name: Upload Xcode result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapribbon-xcresult
          path: |
            ${{ runner.temp }}/MapRibbon.xcresult
            ${{ runner.temp }}/xcodebuild-app.log
            ${{ runner.temp }}/xcodebuild-tests.log
          retention-days: 7
          if-no-files-found: warn

      - name: Fail when validation fails
        if: steps.build.outputs.status != '0' || steps.xcode.outputs.status != '0' || steps.screenshots.outputs.status != '0'
        run: exit 1
