name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build and test MapRibbon
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          UDID="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          for runtime in sorted(payload.get("devices", {}), reverse=True):
              candidates = [
                  device for device in payload["devices"][runtime]
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone")
              ]
              if candidates:
                  print(candidates[0]["udid"])
                  break
          ')"
          test -n "$UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run Xcode tests
        shell: bash
        run: |
          set -euo pipefail
          LOG_FILE="$RUNNER_TEMP/xcodebuild.log"
          if xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            >"$LOG_FILE" 2>&1; then
            tail -n 80 "$LOG_FILE"
          else
            echo "::group::Xcode errors"
            grep -nE "error:|BUILD FAILED|TEST FAILED|Testing failed|The following build commands failed" "$LOG_FILE" | tail -n 160 || true
            echo "::endgroup::"
            echo "::group::Xcode log tail"
            tail -n 220 "$LOG_FILE"
            echo "::endgroup::"
            exit 1
          fi
