name: Apply screenshot localization fixture

on:
  pull_request:

concurrency:
  group: fixture-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
          show-progress: false

      - name: Use locale-derived fixture captions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("MapRibbon/App/MapRibbonApp.swift")
          text = path.read_text()
          old = '''                title: spec.title,
                subtitle: spec.subtitle,
                administrativeArea: "서울특별시",'''
          new = '''                title: spec.title,
                subtitle: nil,
                caption: nil,
                addressSummary: "서울특별시",
                administrativeArea: "서울특별시",'''
          if text.count(old) != 1:
              raise SystemExit(f"expected one fixture snippet, found {text.count(old)}")
          path.write_text(text.replace(old, new))
          PY

          rm -f Scripts/fix-screenshot-localization-trigger.txt
          git restore --source=HEAD -- .github/workflows
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "test: localize screenshot fixture time ranges"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
