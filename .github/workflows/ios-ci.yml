name: Apply PR 11 review

on:
  pull_request:

concurrency:
  group: apply-pr11-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reviewed source changes
        shell: bash
        run: |
          set -euo pipefail
          test -f Scripts/apply_pr11_full_review.py.gz.b64
          base64 --decode Scripts/apply_pr11_full_review.py.gz.b64 | gzip -d > Scripts/apply_pr11_full_review.py
          python3 Scripts/apply_pr11_full_review.py

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "fix: complete board quality review follow-ups"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
