name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Build, test, and capture MapRibbon
    runs-on: macos-15
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          DEVICE_INFO="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          preferred = ["iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"]
          for runtime in sorted(payload.get("devices", {}), reverse=True):
              phones = [
                  device for device in payload["devices"][runtime]
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone")
              ]
              if not phones:
                  continue
              for name in preferred:
                  match = next((device for device in phones if device.get("name") == name), None)
                  if match:
                      print(match["udid"] + "|" + match["name"] + "|" + runtime)
                      raise SystemExit
              pro = next((device for device in phones if "Pro" in device.get("name", "")), None)
              selected = pro or phones[0]
              print(selected["udid"] + "|" + selected["name"] + "|" + runtime)
              raise SystemExit
          ')"
          IFS='|' read -r UDID DEVICE_NAME RUNTIME <<< "$DEVICE_INFO"
          test -n "$UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"
          echo "Selected $DEVICE_NAME on $RUNTIME ($UDID)"

      - name: Run Xcode tests
        id: xcode
        shell: bash
        run: |
          set +e
          LOG_FILE="$RUNNER_TEMP/xcodebuild.log"
          REPORT_FILE="$RUNNER_TEMP/xcode-report.txt"
          xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            >"$LOG_FILE" 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            tail -n 80 "$LOG_FILE"
          else
            {
              echo "Compiler and test diagnostics:"
              grep -nE "error:|BUILD FAILED|TEST FAILED|Testing failed|The following build commands failed" "$LOG_FILE" | tail -n 120 || true
              echo
              echo "Final Xcode log lines:"
              tail -n 120 "$LOG_FILE"
            } > "$REPORT_FILE"
            cat "$REPORT_FILE"
          fi
          exit 0

      - name: Launch simulator and capture board screens
        if: steps.xcode.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          UDID="${{ steps.simulator.outputs.udid }}"
          APP_PATH="$(find "$RUNNER_TEMP/DerivedData/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name 'MapRibbon.app' -print -quit)"
          test -d "$APP_PATH"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"
          SCREENSHOT_DIR="$RUNNER_TEMP/mapribbon-device-screenshots"
          mkdir -p "$SCREENSHOT_DIR"

          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl ui "$UDID" appearance light || true
          xcrun simctl status_bar "$UDID" override \
            --time 10:41 \
            --batteryState charged \
            --batteryLevel 100 \
            --wifiBars 3 \
            --cellularBars 4 || true
          xcrun simctl install "$UDID" "$APP_PATH"

          xcrun simctl launch --terminate-running-process "$UDID" "$BUNDLE_ID" --screenshot-board-editor
          sleep 4
          xcrun simctl io "$UDID" screenshot "$SCREENSHOT_DIR/mapribbon-board-editor-device.png"

          xcrun simctl terminate "$UDID" "$BUNDLE_ID" || true
          xcrun simctl launch "$UDID" "$BUNDLE_ID" --screenshot-board-canvas
          sleep 4
          xcrun simctl io "$UDID" screenshot "$SCREENSHOT_DIR/mapribbon-board-canvas-device.png"

          {
            echo "device=${{ steps.simulator.outputs.name }}"
            echo "runtime=${{ steps.simulator.outputs.runtime }}"
            echo "bundle_id=$BUNDLE_ID"
            echo "commit=$GITHUB_SHA"
          } > "$SCREENSHOT_DIR/metadata.txt"
          ls -lh "$SCREENSHOT_DIR"

      - name: Upload device screenshots
        if: steps.xcode.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: mapribbon-device-screenshots
          path: ${{ runner.temp }}/mapribbon-device-screenshots
          if-no-files-found: error
          retention-days: 14

      - name: Report Xcode failure on the pull request
        if: steps.xcode.outputs.status != '0' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          {
            echo '<!-- mapribbon-xcode-ci -->'
            echo '### Xcode 테스트 실패'
            echo
            echo '```text'
            cat "$RUNNER_TEMP/xcode-report.txt"
            echo '```'
          } > "$RUNNER_TEMP/pr-comment.md"
          gh pr comment "${{ github.event.pull_request.number }}" --body-file "$RUNNER_TEMP/pr-comment.md"
          exit 1

      - name: Fail main-branch run when Xcode tests fail
        if: steps.xcode.outputs.status != '0' && github.event_name != 'pull_request'
        run: exit 1
