name: iOS CI

on:
  pull_request:
  push:
    branches:
      - main
      - agent/full-ui-overhaul
      - agent/board-artwork-atlas-rework

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build, capture, and test MapRibbon
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select an available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          DEVICE_INFO="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          preferred = ["iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"]
          for runtime in sorted(payload.get("devices", {}), reverse=True):
              phones = [d for d in payload["devices"][runtime] if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
              if not phones:
                  continue
              for name in preferred:
                  match = next((d for d in phones if d.get("name") == name), None)
                  if match:
                      print(match["udid"] + "|" + match["name"] + "|" + runtime)
                      raise SystemExit
              selected = next((d for d in phones if "Pro" in d.get("name", "")), phones[0])
              print(selected["udid"] + "|" + selected["name"] + "|" + runtime)
              raise SystemExit
          raise SystemExit("No available iPhone simulator")
          ')"
          IFS='|' read -r UDID DEVICE_NAME RUNTIME <<< "$DEVICE_INFO"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"

      - name: Build app for screenshots
        id: build
        shell: bash
        run: |
          set +e
          LOG_FILE="$RUNNER_TEMP/xcodebuild-app.log"
          xcodebuild build \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            >"$LOG_FILE" 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            grep -nE "error:|BUILD FAILED|The following build commands failed" "$LOG_FILE" | tail -n 160 || true
            tail -n 160 "$LOG_FILE"
          fi
          exit 0

      - name: Capture UI matrix
        id: screenshots
        if: always()
        shell: bash
        run: |
          set -u
          OUT="$RUNNER_TEMP/mapribbon-ui-overhaul"
          mkdir -p "$OUT"
          STATUS=0

          if [ "${{ steps.build.outputs.status }}" != "0" ]; then
            echo "App build failed; screenshots cannot run"
            echo "status=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          UDID="${{ steps.simulator.outputs.udid }}"
          APP_PATH="$(find "$RUNNER_TEMP/DerivedData/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name 'MapRibbon.app' -print -quit)"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"

          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl status_bar "$UDID" override --time 10:41 --batteryState discharging --batteryLevel 100 --wifiBars 3 --cellularBars 4 || true
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl privacy "$UDID" revoke photos "$BUNDLE_ID" || true

          capture() {
            local flag="$1"
            local name="$2"
            local wait_seconds="$3"
            local language="$4"
            local locale="$5"
            local appearance="$6"

            xcrun simctl terminate "$UDID" "$BUNDLE_ID" 2>/dev/null || true
            xcrun simctl ui "$UDID" appearance "$appearance" || return 1
            sleep 1

            if [ "$appearance" = "dark" ]; then
              xcrun simctl launch "$UDID" "$BUNDLE_ID" \
                "$flag" --screenshot-dark \
                -AppleInterfaceStyle Dark \
                -AppleLanguages "($language)" \
                -AppleLocale "$locale" || return 1
            else
              xcrun simctl launch "$UDID" "$BUNDLE_ID" \
                "$flag" \
                -AppleInterfaceStyle Light \
                -AppleLanguages "($language)" \
                -AppleLocale "$locale" || return 1
            fi

            sleep "$wait_seconds"
            xcrun simctl io "$UDID" screenshot "$OUT/$name.png" || return 1
          }

          while IFS='|' read -r flag name wait_seconds language locale appearance; do
            [ -z "$flag" ] && continue
            echo "Capturing $name ($language, $appearance)"
            if ! capture "$flag" "$name" "$wait_seconds" "$language" "$locale" "$appearance"; then
              echo "Capture failed: $name"
              STATUS=1
            fi
          done <<'MATRIX'
          --screenshot-onboarding|onboarding|3|ko|ko_KR|light
          --screenshot-home|home|3|ko|ko_KR|light
          --screenshot-library|library|3|ko|ko_KR|light
          --screenshot-atlas|atlas-korea|6|ko|ko_KR|light
          --screenshot-atlas-japan|atlas-japan|6|ko|ko_KR|light
          --screenshot-settings|settings|3|ko|ko_KR|light
          --screenshot-paywall|paywall|3|ko|ko_KR|light
          --screenshot-generation|generation|3|ko|ko_KR|light
          --screenshot-board-editor|board-editor|3|ko|ko_KR|light
          --screenshot-board-canvas|board-poster|3|ko|ko_KR|light
          --screenshot-export|export|3|ko|ko_KR|light
          --screenshot-places|places|3|ko|ko_KR|light
          --screenshot-board-feed|board-feed|3|ko|ko_KR|light
          --screenshot-board-story|board-story|3|ko|ko_KR|light
          --screenshot-board-canvas|board-poster-ja|3|ja|ja_JP|light
          --screenshot-home|home-dark|3|ko|ko_KR|dark
          --screenshot-atlas|atlas-korea-dark|6|ko|ko_KR|dark
          MATRIX

          COUNT="$(find "$OUT" -maxdepth 1 -name '*.png' | wc -l | tr -d ' ')"
          echo "Captured $COUNT of 17 expected screenshots"
          if [ "$COUNT" -ne 17 ]; then
            STATUS=1
          fi

          {
            echo "device=${{ steps.simulator.outputs.name }}"
            echo "runtime=${{ steps.simulator.outputs.runtime }}"
            echo "commit=$GITHUB_SHA"
            echo "screenshot_count=$COUNT"
          } > "$OUT/metadata.txt"
          ls -lh "$OUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapribbon-ui-overhaul-screenshots
          path: ${{ runner.temp }}/mapribbon-ui-overhaul
          retention-days: 14
          if-no-files-found: warn

      - name: Run Xcode tests
        id: xcode
        shell: bash
        run: |
          set +e
          LOG_FILE="$RUNNER_TEMP/xcodebuild-tests.log"
          xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/MapRibbon.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            >"$LOG_FILE" 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -eq 0 ]; then
            tail -n 100 "$LOG_FILE"
          else
            grep -nE "error:|BUILD FAILED|TEST FAILED|Testing failed|The following build commands failed" "$LOG_FILE" | tail -n 160 || true
            tail -n 160 "$LOG_FILE"
          fi
          exit 0

      - name: Upload Xcode result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapribbon-xcresult
          path: |
            ${{ runner.temp }}/MapRibbon.xcresult
            ${{ runner.temp }}/xcodebuild-app.log
            ${{ runner.temp }}/xcodebuild-tests.log
          retention-days: 7
          if-no-files-found: warn

      - name: Enforce validation result
        if: always()
        shell: bash
        run: |
          BUILD="${{ steps.build.outputs.status }}"
          SCREENSHOTS="${{ steps.screenshots.outputs.status }}"
          TESTS="${{ steps.xcode.outputs.status }}"
          echo "build=$BUILD screenshots=$SCREENSHOTS tests=$TESTS"
          if [ "$BUILD" != "0" ] || [ "$SCREENSHOTS" != "0" ] || [ "$TESTS" != "0" ]; then
            exit 1
          fi
