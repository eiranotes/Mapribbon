name: Apply route materials

on:
  push:
    branches:
      - feat/textured-route-materials
    paths:
      - Scripts/apply_route_materials.py
      - Scripts/RouteMaterials/**
      - .github/workflows/apply-route-materials.yml

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[route-materials-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply source and image assets
        run: python3 Scripts/apply_route_materials.py

      - name: Remove one-time staging files
        run: rm -rf Scripts/RouteMaterials Scripts/apply_route_materials.py .github/workflows/apply-route-materials.yml

      - name: Commit generated materials
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No material changes."
            exit 0
          fi
          git commit -m "feat: render textured rope routes [route-materials-applied]"
          git push
