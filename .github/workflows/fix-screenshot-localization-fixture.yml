name: Fix screenshot localization fixture

on:
  push:
    branches:
      - claude/board-image-quality-4zwhs8

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
          show-progress: false

      - name: Use locale-derived fixture captions
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("MapRibbon/App/MapRibbonApp.swift")
          text = path.read_text()
          old = '''                title: spec.title,
                subtitle: spec.subtitle,
                administrativeArea: "서울특별시",'''
          new = '''                title: spec.title,
                subtitle: nil,
                caption: nil,
                addressSummary: "서울특별시",
                administrativeArea: "서울특별시",'''
          if text.count(old) != 1:
              raise SystemExit(f"expected one fixture snippet, found {text.count(old)}")
          path.write_text(text.replace(old, new))
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MapRibbon/App/MapRibbonApp.swift
          git commit -m "test: localize screenshot fixture time ranges"
          git push origin "HEAD:${GITHUB_REF_NAME}"
