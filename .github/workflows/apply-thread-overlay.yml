name: Apply thread overlay refinement

on:
  push:
    branches:
      - agent/thread-overlay-wider-map
    paths:
      - scripts/apply_thread_overlay.py
      - .github/workflows/apply-thread-overlay.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout refinement branch
        uses: actions/checkout@v4
        with:
          ref: agent/thread-overlay-wider-map

      - name: Apply scoped source changes
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/apply_thread_overlay.py
          python3 scripts/apply_thread_overlay.py

      - name: Commit source changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MapRibbon/Models/Models.swift \
                  MapRibbon/Views/BoardViews.swift \
                  MapRibbon/Services/BoardGenerationService.swift \
                  MapRibbon/App/MapRibbonApp.swift \
                  MapRibbonTests/PhotoClustererTests.swift
          git diff --cached --check
          git commit -m "feat: overlay selectable thread on wider travel map"
          git push origin HEAD:agent/thread-overlay-wider-map
