name: Apply UI overhaul

on:
  push:
    branches:
      - agent/full-ui-overhaul

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-15
    timeout-minutes: 50
    steps:
      - name: Checkout overhaul branch
        uses: actions/checkout@v4
        with:
          ref: agent/full-ui-overhaul
          fetch-depth: 0

      - name: Assemble and apply UI overhaul
        shell: bash
        run: |
          set -euo pipefail
          cat scripts/ui_overhaul_parts/part* > "$RUNNER_TEMP/apply_ui_overhaul.py"
          python3 -m py_compile "$RUNNER_TEMP/apply_ui_overhaul.py"
          python3 "$RUNNER_TEMP/apply_ui_overhaul.py"
          git diff --check
          git status --short

      - name: Select available iPhone simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          DEVICE_INFO="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload = json.load(sys.stdin)
          preferred = ["iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"]
          for runtime in sorted(payload.get("devices", {}), reverse=True):
              phones = [d for d in payload["devices"][runtime] if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
              if not phones:
                  continue
              for name in preferred:
                  match = next((d for d in phones if d.get("name") == name), None)
                  if match:
                      print(match["udid"] + "|" + match["name"] + "|" + runtime)
                      raise SystemExit
              selected = next((d for d in phones if "Pro" in d.get("name", "")), phones[0])
              print(selected["udid"] + "|" + selected["name"] + "|" + runtime)
              raise SystemExit
          ')"
          IFS='|' read -r UDID DEVICE_NAME RUNTIME <<< "$DEVICE_INFO"
          test -n "$UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"

      - name: Run Xcode tests
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/MapRibbon.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            | tee "$RUNNER_TEMP/xcodebuild.log"

      - name: Capture verified simulator screens
        shell: bash
        run: |
          set -euo pipefail
          UDID="${{ steps.simulator.outputs.udid }}"
          APP_PATH="$(find "$RUNNER_TEMP/DerivedData/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name 'MapRibbon.app' -print -quit)"
          test -d "$APP_PATH"
          BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")"
          OUT="$RUNNER_TEMP/mapribbon-ui-overhaul"
          mkdir -p "$OUT"

          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl ui "$UDID" appearance light || true
          xcrun simctl status_bar "$UDID" override --time 10:41 --batteryState charged --batteryLevel 100 --wifiBars 3 --cellularBars 4 || true
          xcrun simctl install "$UDID" "$APP_PATH"
          xcrun simctl privacy "$UDID" revoke photos "$BUNDLE_ID" || true

          capture() {
            local flag="$1"
            local name="$2"
            xcrun simctl launch --terminate-running-process "$UDID" "$BUNDLE_ID" "$flag"
            sleep 3
            xcrun simctl io "$UDID" screenshot "$OUT/$name.png"
          }

          capture --screenshot-onboarding onboarding
          capture --screenshot-home home
          capture --screenshot-library library
          capture --screenshot-atlas atlas
          capture --screenshot-settings settings
          capture --screenshot-paywall paywall
          capture --screenshot-generation generation
          capture --screenshot-export export
          capture --screenshot-places places
          capture --screenshot-board-editor board-editor
          capture --screenshot-board-canvas board-canvas

          {
            echo "device=${{ steps.simulator.outputs.name }}"
            echo "runtime=${{ steps.simulator.outputs.runtime }}"
            echo "bundle_id=$BUNDLE_ID"
            echo "source_commit=$GITHUB_SHA"
          } > "$OUT/metadata.txt"
          ls -lh "$OUT"

      - name: Upload verified screenshots
        uses: actions/upload-artifact@v4
        with:
          name: mapribbon-ui-overhaul-verified
          path: ${{ runner.temp }}/mapribbon-ui-overhaul
          retention-days: 14
          if-no-files-found: error

      - name: Upload Xcode diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mapribbon-ui-overhaul-xcresult
          path: |
            ${{ runner.temp }}/MapRibbon.xcresult
            ${{ runner.temp }}/xcodebuild.log
          retention-days: 7
          if-no-files-found: warn

      - name: Commit verified implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MapRibbon .github/workflows/ios-ci.yml
          git diff --cached --quiet && { echo "No implementation changes to commit"; exit 1; }
          git commit -m "feat: overhaul MapRibbon UI and board artwork"
          git push origin HEAD:agent/full-ui-overhaul
