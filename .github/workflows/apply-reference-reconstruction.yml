name: Apply reference reconstruction

on:
  pull_request:
    branches:
      - main

concurrency:
  group: reference-reconstruction-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  apply:
    if: github.head_ref == 'agent/full-ui-overhaul' && github.actor != 'github-actions[bot]'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout task branch
        uses: actions/checkout@v4
        with:
          ref: agent/full-ui-overhaul
          fetch-depth: 0

      - name: Record Xcode environment
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Apply reference reconstruction
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/apply_reference_reconstruction.py
          python3 scripts/apply_reference_reconstruction.py
          git diff --check
          git status --short
          git diff --stat

      - name: Resolve simulator
        id: simulator
        run: |
          set -euo pipefail
          DEVICE_INFO="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          payload=json.load(sys.stdin)
          preferred=["iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"]
          for runtime in sorted(payload.get("devices", {}), reverse=True):
              phones=[d for d in payload["devices"][runtime] if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
              if not phones:
                  continue
              for name in preferred:
                  match=next((d for d in phones if d.get("name")==name), None)
                  if match:
                      print(match["udid"]+"|"+match["name"]+"|"+runtime)
                      raise SystemExit
              selected=next((d for d in phones if "Pro" in d.get("name", "")), phones[0])
              print(selected["udid"]+"|"+selected["name"]+"|"+runtime)
              raise SystemExit
          ')"
          IFS='|' read -r UDID NAME RUNTIME <<< "$DEVICE_INFO"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME" >> "$GITHUB_OUTPUT"

      - name: Run Xcode tests
        id: xcode
        continue-on-error: true
        run: |
          set +e
          LOG="$RUNNER_TEMP/reference-reconstruction-xcode.log"
          xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -resultBundlePath "$RUNNER_TEMP/MapRibbon.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            >"$LOG" 2>&1
          STATUS=$?
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" -ne 0 ]; then
            grep -nE "error:|BUILD FAILED|TEST FAILED|Testing failed|The following build commands failed" "$LOG" | tail -n 120 || true
            tail -n 140 "$LOG"
          else
            tail -n 80 "$LOG"
          fi
          exit "$STATUS"

      - name: Stage verified source artifact
        if: steps.xcode.outputs.status == '0'
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/reference-reconstruction-source"
          mkdir -p "$OUT/MapRibbon/App" "$OUT/MapRibbon/Views" "$OUT/MapRibbonTests" "$OUT/.github/workflows"
          cp MapRibbon/App/MapRibbonApp.swift "$OUT/MapRibbon/App/"
          cp MapRibbon/Views/BoardViews.swift "$OUT/MapRibbon/Views/"
          cp MapRibbon/Views/AtlasSettingsViews.swift "$OUT/MapRibbon/Views/"
          cp MapRibbonTests/PhotoClustererTests.swift "$OUT/MapRibbonTests/"
          cp .github/workflows/ios-ci.yml "$OUT/.github/workflows/"

      - name: Upload verified source
        if: steps.xcode.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: reference-reconstruction-source
          path: ${{ runner.temp }}/reference-reconstruction-source
          retention-days: 7
          if-no-files-found: error

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reference-reconstruction-diagnostics
          path: |
            ${{ runner.temp }}/reference-reconstruction-xcode.log
            ${{ runner.temp }}/MapRibbon.xcresult
          retention-days: 7
          if-no-files-found: warn

      - name: Fail on Xcode error
        if: steps.xcode.outputs.status != '0'
        run: exit 1
