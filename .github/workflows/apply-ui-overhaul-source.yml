name: Apply verified UI source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-source:
    if: github.head_ref == 'agent/full-ui-overhaul' && github.actor != 'github-actions[bot]'
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/full-ui-overhaul
          fetch-depth: 0

      - name: Apply source patch
        run: |
          set -euo pipefail
          cat scripts/ui_overhaul_parts/part* > "$RUNNER_TEMP/apply_ui_overhaul.py"
          python3 -m py_compile "$RUNNER_TEMP/apply_ui_overhaul.py"
          python3 "$RUNNER_TEMP/apply_ui_overhaul.py"
          git diff --check

      - name: Resolve simulator
        id: sim
        run: |
          set -euo pipefail
          UDID="$(xcrun simctl list devices available -j | python3 -c '
          import json, sys
          devices=json.load(sys.stdin).get("devices", {})
          for runtime in sorted(devices, reverse=True):
              phones=[d for d in devices[runtime] if d.get("isAvailable") and d.get("name", "").startswith("iPhone")]
              if phones:
                  print(next((d for d in phones if "Pro" in d.get("name", "")), phones[0])["udid"])
                  raise SystemExit
          ')"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Xcode test
        run: |
          set -euo pipefail
          xcodebuild test \
            -project MapRibbon.xcodeproj \
            -scheme MapRibbon \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.udid }}" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO

      - name: Commit app source
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MapRibbon
          git diff --cached --quiet && { echo "No app source changes"; exit 1; }
          git commit -m "feat: overhaul MapRibbon UI and board artwork"
          git push origin HEAD:agent/full-ui-overhaul
